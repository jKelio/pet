server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api → backend server (strips the /api prefix)
    # SERVER_URL is injected at container start via envsubst (see Dockerfile CMD).
    # docker-compose: SERVER_URL=http://server:3000  |  Render: https://<host> via fromService.
    location /api/ {
        proxy_pass          ${SERVER_URL}/;
        proxy_ssl_server_name on;
        proxy_http_version  1.1;
        # Free-tier cold start can take ~50s — keep the wakeup request alive long
        # enough for Render to spin the backend up instead of returning 504.
        proxy_connect_timeout 90s;
        proxy_send_timeout    90s;
        proxy_read_timeout    90s;
        proxy_set_header Host              $proxy_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie            $http_cookie;
    }

    # SPA fallback — serve index.html for all unmatched routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
}
