server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers ('unsafe-inline' styles needed for React/recharts inline styles)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'" always;
    # Enable once the site is served exclusively over HTTPS:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Proxy /api → backend server (strips the /api prefix)
    # SERVER_URL is injected at container start via envsubst (see Dockerfile CMD).
    # docker-compose: SERVER_URL=http://server:3000  |  Render: https://<host> via fromService.

    # Health probe — exact match takes priority over /api/ prefix.
    # Intercepts HTTP 429 from Render's edge (rate-limiting during cold-start) and
    # converts it to 200 {"status":"rate-limited"} so the frontend can back off
    # gracefully instead of receiving a raw 429 and eventually showing
    # "Server unavailable".
    location = /api/health {
        proxy_pass          ${SERVER_URL}/health;
        proxy_ssl_server_name on;
        proxy_http_version  1.1;
        proxy_connect_timeout 150s;
        proxy_send_timeout    150s;
        proxy_read_timeout    150s;
        proxy_set_header Host              $proxy_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie            $http_cookie;

        proxy_intercept_errors on;
        error_page 429 = @health_rate_limited;
    }

    location /api/ {
        proxy_pass          ${SERVER_URL}/;
        proxy_ssl_server_name on;
        proxy_http_version  1.1;
        # Free-tier cold start can take ~50s but occasionally longer — keep the
        # wakeup request alive long enough for Render to spin the backend up
        # instead of returning 504. Matches the frontend wakeup budget (150s).
        proxy_connect_timeout 150s;
        proxy_send_timeout    150s;
        proxy_read_timeout    150s;
        proxy_set_header Host              $proxy_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie            $http_cookie;
    }

    # Named location for intercepted 429s on the health endpoint.
    location @health_rate_limited {
        default_type application/json;
        return 200 '{"status":"rate-limited"}';
    }

    # SPA fallback — serve index.html for all unmatched routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively.
    # nginx drops server-level add_header directives in blocks that declare
    # their own, so the security headers must be repeated here.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'" always;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
}
