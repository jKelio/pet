apiVersion: v1
kind: Service
metadata:
  name: {{ include "pet.fullname" . }}-web
  labels:
    {{- include "pet.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "pet.web.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.web.port }}
      targetPort: {{ .Values.web.port }}
      protocol: TCP
      name: http
