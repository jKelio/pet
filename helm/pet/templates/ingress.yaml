{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "pet.fullname" . }}
  labels:
    {{- include "pet.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          # API traffic → server
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "pet.fullname" . }}-server
                port:
                  number: {{ .Values.server.port }}
          # Auth cookie routes → server
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: {{ include "pet.fullname" . }}-server
                port:
                  number: {{ .Values.server.port }}
          # Everything else → web (SPA)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "pet.fullname" . }}-web
                port:
                  number: {{ .Values.web.port }}
{{- end }}
